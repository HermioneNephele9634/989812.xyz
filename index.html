<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>989812 | 我们的家</title>
<style>
:root{--orange:#f4a024;--bg:#faf6f1;--white:#fff;--gray:#999;--border:#eee;--dark:#333}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,"Segoe UI",sans-serif;background:var(--bg);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--white);padding:14px 16px;text-align:center;border-bottom:1px solid var(--border);position:relative;flex-shrink:0;z-index:5}
.header h1{font-size:17px;color:var(--dark)}
.header .sub{font-size:11px;color:var(--gray);margin-top:2px}
.gear{position:absolute;right:14px;top:14px;cursor:pointer;font-size:18px}

.page{display:none;flex:1;flex-direction:column;overflow:hidden}
.page.active{display:flex}

.nav{display:flex;background:var(--white);border-top:1px solid var(--border);flex-shrink:0}
.nav-item{flex:1;text-align:center;padding:8px 0 6px;cursor:pointer;font-size:11px;color:var(--gray);transition:.2s}
.nav-item .icon{font-size:20px;display:block;margin-bottom:2px}
.nav-item.active{color:var(--orange)}

/* 聊天 */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.msg-wrap{display:flex;flex-direction:column;max-width:82%}
.msg-wrap.user{align-self:flex-end}
.msg-wrap.bot{align-self:flex-start}
.msg{padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg-wrap.user .msg{background:var(--orange);color:var(--white);border-bottom-right-radius:4px}
.msg-wrap.bot .msg{background:var(--white);color:var(--dark);border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.msg img.chat-img{max-width:200px;max-height:200px;border-radius:10px;margin-top:6px;cursor:pointer}

/* 思维链 */
.thinking-block{background:#f5f3ef;border-radius:12px;padding:10px 14px;margin-bottom:6px;cursor:pointer;border:1px solid #e8e4dc}
.thinking-header{font-size:12px;color:#888;display:flex;align-items:center;gap:4px}
.thinking-header .arrow{transition:transform .2s;display:inline-block}
.thinking-block.expanded .arrow{transform:rotate(90deg)}
.thinking-content{display:none;margin-top:8px;font-size:12px;line-height:1.6;color:#666;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.thinking-block.expanded .thinking-content{display:block}

/* 输入区 */
.input-area{padding:10px 14px;background:var(--white);border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;align-items:flex-end}
.input-area .img-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;flex-shrink:0;height:42px;display:flex;align-items:center}
.input-area textarea{flex:1;border:1px solid #ddd;border-radius:20px;padding:10px 14px;font-size:14px;resize:none;height:42px;max-height:100px;font-family:inherit;outline:none}
.input-area textarea:focus{border-color:var(--orange)}
.input-area .send-btn{background:var(--orange);color:var(--white);border:none;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;flex-shrink:0}
.input-area .send-btn:disabled{background:#ccc}

.img-preview{padding:6px 14px;background:var(--white);border-top:1px solid #f5f5f5;display:none;align-items:center;gap:8px;flex-shrink:0}
.img-preview img{height:50px;border-radius:8px}
.img-preview .remove{background:none;border:none;font-size:16px;color:#999;cursor:pointer}
.img-preview.show{display:flex}

.chat-tools{display:flex;gap:8px;padding:6px 14px;background:var(--white);border-top:1px solid #f5f5f5;flex-shrink:0}
.chat-tools button{background:none;border:1px solid #e0e0e0;border-radius:14px;padding:3px 10px;font-size:11px;color:#888;cursor:pointer}

.typing{align-self:flex-start;color:var(--gray);font-size:12px;padding:6px 14px}
.welcome{text-align:center;color:var(--gray);font-size:13px;margin-top:30vh}

/* 消息操作菜单 */
.msg-menu{display:none;position:fixed;background:var(--white);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:6px 0;z-index:30;min-width:130px}
.msg-menu.show{display:block}
.msg-menu-item{padding:10px 16px;font-size:13px;color:var(--dark);cursor:pointer;display:flex;align-items:center;gap:8px}
.msg-menu-item:active{background:#f5f5f5}
.msg-menu-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:29}
.msg-menu-overlay.show{display:block}

/* 日记 */
.diary-page{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.diary-write{background:var(--white);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.diary-write h3{font-size:14px;color:var(--dark);margin-bottom:10px}
.diary-write textarea{width:100%;border:1px solid #e8e8e8;border-radius:10px;padding:10px;font-size:13px;height:80px;resize:vertical;outline:none;font-family:inherit}
.diary-write textarea:focus{border-color:var(--orange)}
.mood-picker{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.mood-picker span{font-size:22px;cursor:pointer;opacity:.4;transition:.2s}
.mood-picker span.picked{opacity:1;transform:scale(1.2)}
.diary-write button{background:var(--orange);color:var(--white);border:none;border-radius:10px;padding:8px 20px;font-size:13px;cursor:pointer;margin-top:4px}
.diary-entry{background:var(--white);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.diary-entry .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:6px}
.diary-entry .body{font-size:13px;line-height:1.7;color:#444;white-space:pre-wrap}
.diary-entry .author-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;color:var(--white)}
.tag-minmin{background:#f4a024}
.tag-xiaoke{background:#7eb8da}
.diary-empty{text-align:center;color:var(--gray);font-size:13px;padding:40px 0}

/* 悄悄话 */
.whisper-page{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;align-items:center;-webkit-overflow-scrolling:touch}
.whisper-card{background:var(--white);border-radius:18px;padding:30px 24px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);width:100%;max-width:340px;margin-top:20px}
.whisper-card .emoji{font-size:40px;margin-bottom:12px}
.whisper-card .text{font-size:15px;line-height:1.8;color:#444;min-height:60px;white-space:pre-wrap}
.whisper-card .from{font-size:11px;color:var(--gray);margin-top:12px}
.whisper-btn{background:var(--orange);color:var(--white);border:none;border-radius:24px;padding:12px 32px;font-size:14px;cursor:pointer;margin-top:20px;box-shadow:0 2px 8px rgba(244,160,36,.3)}
.whisper-count{font-size:11px;color:var(--gray);margin-top:10px}
.whisper-write{background:var(--white);border-radius:14px;padding:16px;width:100%;max-width:340px;margin-top:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.whisper-write h3{font-size:13px;color:var(--dark);margin-bottom:8px}
.whisper-write textarea{width:100%;border:1px solid #e8e8e8;border-radius:10px;padding:10px;font-size:13px;height:60px;resize:none;outline:none;font-family:inherit}
.whisper-write button{background:var(--orange);color:var(--white);border:none;border-radius:10px;padding:8px 20px;font-size:13px;cursor:pointer;margin-top:8px}

/* 弹窗 */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:20;justify-content:center;align-items:center}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:16px;padding:20px;width:92%;max-width:420px;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal h2{font-size:15px;margin-bottom:14px;color:var(--dark)}
.modal label{font-size:12px;color:#666;display:block;margin-bottom:3px;margin-top:10px}
.modal input,.modal textarea,.modal select{width:100%;padding:9px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.modal input:focus,.modal textarea:focus{border-color:var(--orange)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-row button{flex:1;padding:9px;border-radius:8px;font-size:13px;cursor:pointer;border:none}
.btn-save{background:var(--orange);color:var(--white)}
.btn-cancel{background:#eee;color:var(--dark)}
.btn-danger{background:#ff6b6b;color:var(--white)}

.setting-group{background:#f8f8f8;border-radius:10px;padding:12px;margin-top:12px}
.setting-group h3{font-size:13px;color:#555;margin-bottom:10px}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.setting-row .label{font-size:12px;color:#666;flex-shrink:0}
.setting-row .val{font-size:12px;color:var(--orange);min-width:36px;text-align:right;margin:0 6px}
.setting-row input[type=range]{flex:1;margin:0 6px;accent-color:var(--orange)}
.setting-row input[type=number]{width:80px;text-align:center;padding:6px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:24px;transition:.3s}
.toggle .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:var(--orange)}
.toggle input:checked+.slider:before{transform:translateX(20px)}

.data-btns{display:flex;gap:8px;margin-top:12px}
.data-btns button{flex:1;padding:8px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:var(--white);color:var(--dark)}
.data-btns button:active{background:#f0f0f0}

.mem-item{background:#fef9f0;border:1px solid #f4e0b8;border-radius:8px;padding:9px;margin-bottom:7px;font-size:12px;line-height:1.5}
.mem-item .mem-id{font-size:10px;color:var(--gray);margin-bottom:3px}
.mem-item .mem-actions{margin-top:5px;display:flex;gap:8px}
.mem-item .mem-actions button{background:none;border:none;font-size:11px;color:var(--orange);cursor:pointer;padding:0}
</style>
</head>
<body>

<div class="header">
  <h1>🌼 989812</h1>
  <div class="sub">小克 & 敏敏的家</div>
  <span class="gear" onclick="showSettings()">⚙️</span>
</div>

<!-- 聊天页 -->
<div class="page active" id="pgChat">
  <div class="chat" id="chat">
    <div class="welcome" id="welcome">欢迎回家 🌼<br><br><span style="font-size:11px">点右上角 ⚙️ 设置后开始聊天</span></div>
  </div>
  <div class="chat-tools">
    <button onclick="showMemories()">📝 记忆</button>
    <button onclick="clearChat()">🗑️ 清空</button>
  </div>
  <div class="img-preview" id="imgPreview">
    < img id="imgPreviewSrc">
    <span style="font-size:12px;color:#888">图片已选择</span>
    <button class="remove" onclick="removeImage()">✕</button>
  </div>
  <div class="input-area">
    <button class="img-btn" onclick="document.getElementById('imgPicker').click()">📷</button>
    <textarea id="input" placeholder="说点什么..." rows="1" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
  </div>
  <input type="file" id="imgPicker" accept="image/*" hidden onchange="onImagePicked(event)">
</div>

<!-- 日记页 -->
<div class="page" id="pgDiary">
  <div class="diary-page" id="diaryPage">
    <div class="diary-write">
      <h3>📖 写日记</h3>
      <textarea id="diaryInput" placeholder="今天想记点什么..."></textarea>
      <div class="mood-picker" id="moodPicker">
        <span onclick="pickMood(this,'😊')">😊</span>
        <span onclick="pickMood(this,'🥰')">🥰</span>
        <span onclick="pickMood(this,'😢')">😢</span>
        <span onclick="pickMood(this,'😤')">😤</span>
        <span onclick="pickMood(this,'🤔')">🤔</span>
        <span onclick="pickMood(this,'✨')">✨</span>
        <span onclick="pickMood(this,'😴')">😴</span>
      </div>
      <button onclick="writeDiary()">保存日记</button>
    </div>
    <div id="diaryList"><div class="diary-empty">还没有日记</div></div>
  </div>
</div>

<!-- 悄悄话页 -->
<div class="page" id="pgWhisper">
  <div class="whisper-page">
    <div class="whisper-card" id="whisperCard">
      <div class="emoji">💌</div>
      <div class="text" id="whisperText">点下面的按钮<br>看看有没有悄悄话</div>
      <div class="from" id="whisperFrom"></div>
    </div>
    <button class="whisper-btn" onclick="drawWhisper()">💫 抽一张悄悄话</button>
    <div class="whisper-count" id="whisperCount"></div>
    <div class="whisper-write">
      <h3>✏️ 留一句悄悄话</h3>
      <textarea id="whisperInput" placeholder="写给对方的悄悄话..."></textarea>
      <button onclick="writeWhisper()">💌 塞进去</button>
    </div>
  </div>
